unbind C-b
set -g prefix C-a
set -g default-terminal "screen-256color"
set-option -a terminal-features 'stterm-256color:RGB'
# Tc and sitm allow vim to use true colors and italics
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -g status-style bg=default,fg=blue
set -g status-left ''
set -g status-right ''
set -g history-limit 50000
set -g display-time 4000
set -g display-panes-time 4000
set -s escape-time 0

setw -g aggressive-resize on
# Copy mode colors
setw -g mode-style fg=colour0
setw -g mode-style bg=colour237

# Copy behavior is system dependent
if-shell "uname | grep -q Darwin" "source-file .tmux_copy_macosx" "source-file .tmux_copy_linux"


set -g window-status-current-format "#[fg=green,bold]#I #W#F"
set -g window-status-format "#[fg=dim]#I #W#F"
set -g window-status-current-style bg=default,fg=green
set -g window-status-style bg=default,fg=colour244
set -g set-titles-string '#H:#S.#I.#P #W #T'

# Message
set -g message-style fg=colour0,bg=colour3

# Go to last active window
bind C-a last-window

# easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window
bind C-l send-keys 'C-l'

# Useful in nested tmux sessions to send to inner sessions
bind a send-prefix

# split windows like vim
bind s split-window -v
bind v split-window -h

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 1
bind > resize-pane -R 1
bind - resize-pane -D 1
bind + resize-pane -U 1

# Smart pane switching with awareness of vim splits
# note: horizontal navigation is disabled due to clashes with common keys
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# vi-style controls for copy mode
bind Escape copy-mode
setw -g mode-keys vi
set -g status-keys vi

# Mouse
set -g mouse on
# toggle statusbar CTRL+UP
bind y set -q status
bind -n C-Up set -q status

# status bar on top
set -g status-position top

# Set window notifications
# setw -g monitor-activity on
set -g visual-activity off
setw -g automatic-rename off

# source .tmux.conf as suggested in 'man tmux'
unbind r
bind r source-file '/home/dmarti/.tmux.conf'

# use vi default for search
unbind f
bind / command-prompt "find-window '%%'"

# make stuff start at 1 not 0
set -g base-index 1
set -g pane-base-index 1

# quick view of processes
bind '~' split-window "exec htop"
bind C-R split-window "exec vim ~/.remind/events.txt"

# vim: ft=tmux:
